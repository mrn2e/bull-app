<!doctype html>
<html lang="en">

<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for bull-app">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
    }
    bull-app {
      margin: var(--ddd-spacing-2);
      border: var(--ddd-border-md);
      border-radius: var(--ddd-radius-lg);
    }
    bull-app:hover {
      box-shadow: var(--ddd-boxShadow-sm);
    }
  </style>

  <title>bull-app</title>
</head>

<body>
  <div id="demo">
    <h1>bull-app</h1>
    <h2>Default</h2>
    <bull-app>
      <button id="calendarBtn">
        Calendar
      </button>
    </bull-app>
  </div>
  <div id="pagesContainer" style="display: none;">
    <bull-pages activePage="calendar"></bull-pages>
  </div>

  <script>
    document.getElementById('calendarBtn').addEventListener('click', () => {
      document.getElementById('demo').style.display = 'none';
      document.getElementById('pagesContainer').style.display = 'block';
    });
  </script>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script type="module" src="./bull-app.js"></script>
</body>
</html>
