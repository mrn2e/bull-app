<!doctype html>
<html lang="en">

<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for bull-app">
  <link rel="icon" href="bull-icon-color.png">

  <style>
    :root {
      --ddd-spacing-0: 0;
      --ddd-spacing-1: 0.25rem;
      --ddd-spacing-2: 0.5rem;
      --ddd-spacing-3: 0.75rem;
      --ddd-spacing-4: 1rem;
      --ddd-border-md: 2px solid var(--ddd-theme-default-potentialMidnight);
      --ddd-radius-lg: 1rem;
      --ddd-boxShadow-sm: 0 12px 24px var(--ddd-theme-default-potentialMidnight);
    }

    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
      background-color: var(--ddd-theme-default-alertUrgent);
      color: var(--ddd-theme-default-error);
      font-family: var(--ddd-font-primary);
    }
    body {
      min-height: 750px;
    }
    #demo {
      padding: var(--ddd-spacing-4);
    }
    .hero-section {
      position: relative;
      width: 100%;
      max-width: 1920px;
      min-height: 360px;
      margin-bottom: var(--ddd-spacing-4);
      background: center / cover no-repeat url("heroimage.jpg");
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 16px;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: var(--ddd-theme-default-potentialMidnight);
      backdrop-filter: brightness(0.75);
      pointer-events: none;
    }
    .hero-text {
      position: relative;
      z-index: 1;
      color: var(--ddd-theme-default-warningLight);
      text-align: center;
      padding: var(--ddd-spacing-4);
      max-width: 90%;
    }
    .hero-text h2 {
      margin: 0 0 0 12px;
      font-size: clamp(2rem, 4vw, 4rem);
      letter-spacing: 0.03em;
      line-height: 1.05;
    }
    .hero-text p {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--ddd-theme-default-warningLight);
    }
    .team-box {
      background: var(--ddd-theme-default-error);
      border-radius: 16px;
      padding: var(--ddd-spacing-4);
      margin-bottom: var(--ddd-spacing-4);
      box-shadow: var(--ddd-boxShadow-sm) var(--ddd-theme-default-error);
    }
    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--ddd-spacing-3);
      padding: 1rem 0;
      border-bottom:var(--ddd-border-xs) var(--ddd-theme-default-error);
    }
    .team-row:last-child {
      border-bottom: none;
      padding-bottom: var(--ddd-spacing-0);
    }
    .team-label {
      font-size: 20px;
      font-weight: var(--ddd-font-size-bold);
      color: var(--ddd-theme-default-warningLight);
      white-space: nowrap;
    }
    .team-images {
      display: grid;
      grid-template-columns: repeat(5, minmax(48px, 1fr));
      gap: 12px;
      width: min(100%, 60%);
    }
    .team-images img {
      width: 100%;
      aspect-ratio: 1 / 1;
      height: auto;
      object-fit: cover;
      border-radius: 12px;
      border: var(--ddd-border-sm)var(--ddd-theme-default-error);
    }
    bull-app {
      margin: var(--ddd-spacing-2) 0 0;
      border: var(--ddd-border-md);
      border-radius: var(--ddd-radius-lg);
    }
    bull-app:hover {
      box-shadow: var(--ddd-boxShadow-sm);
    }
  </style>
  <title>Bull Poker Leauge</title>
</head>
  <script type="module" src="./bull-playlist.js"></script>
  <script type="module" src="./bull-app.js"></script>
  <script type="module" src="./bull-banner.js"></script>
  <script type="module" src="./bull-pages.js"></script>
  <script type="module" src="./bull-footer.js"></script>
<body>
  <bull-banner></bull-banner>

  <div id="demo">
    <section class="hero-section" aria-label="Bull Poker League hero image">
      <div class="hero-overlay"></div>
      <div class="hero-text">
        <h2>Welcome to the Bull Poker League</h2>
        <p>High stakes, bold players, and the thrill of the table.</p>
      </div>
    </section>

    <section class="team-box" aria-label="Players and Bulls overview">
      <div class="team-row">
        <div class="team-label">Players</div>
        <div class="team-images">
          <img src="player1.jpg" alt="Player 1">
          <img src="player2.jpeg" alt="Player 2">
          <img src="player3.png" alt="Player 3">
          <img src="player4.jpg" alt="Player 4">
          <img src="player5.jpg" alt="Player 5">
        </div>
      </div>
      <div class="team-row">
        <div class="team-label">Bulls</div>
        <div class="team-images">
          <img src="bull1.jpg" alt="Bull 1">
          <img src="bull2real.png" alt="Bull 2">
          <img src="bull3real.png" alt="Bull 3">
          <img src="bull4-real.png" alt="Bull 4">
          <img src="bull5.jpg" alt="Bull 5">
        </div>
      </div>
    </section>

    <bull-app>
      <bull-playlist></bull-playlist>
    </bull-app>
  </div>
  <div id="pagesContainer" style="display: none;">
    <bull-pages activePage="calendar"></bull-pages>
  </div>
 
<bull-footer></bull-footer>
  </div>

  <script>
    const banner = document.querySelector('bull-banner');
    const demo = document.getElementById('demo');
    const pagesContainer = document.getElementById('pagesContainer');

    if (banner && demo && pagesContainer) {
      banner.addEventListener('calendar-click', () => {
        demo.style.display = 'none';
        pagesContainer.style.display = 'block';
        const bullPages = pagesContainer.querySelector('bull-pages');
        if (bullPages) bullPages.activePage = 'calendar';
      });

      banner.addEventListener('roster-click', () => {
        demo.style.display = 'none';
        pagesContainer.style.display = 'block';
        const bullPages = pagesContainer.querySelector('bull-pages');
        if (bullPages) bullPages.activePage = 'roster';
      });

      banner.addEventListener('about-click', () => {
        demo.style.display = 'none';
        pagesContainer.style.display = 'block';
        const bullPages = pagesContainer.querySelector('bull-pages');
        if (bullPages) bullPages.activePage = 'about';
      });

      banner.addEventListener('home-click', () => {
        demo.style.display = 'block';
        pagesContainer.style.display = 'none';
      });

    }
  </script>
</body>
</html>
