<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for bull-app">
  <link rel="icon" href="./images/bull-icon-color.png">

  <style>
    :root {
      --ddd-spacing-0: 0;
      --ddd-spacing-1: 0.25rem;
      --ddd-spacing-2: 0.5rem;
      --ddd-spacing-3: 0.75rem;
      --ddd-spacing-4: 1rem;
      --ddd-border-md: 2px solid var(--ddd-theme-default-potentialMidnight);
      --ddd-radius-lg: 1rem;
      --ddd-boxShadow-sm: 0 12px 24px var(--ddd-theme-default-potentialMidnight);
    }

    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
      background-color: var(--ddd-theme-default-alertUrgent);
      color: var(--ddd-theme-default-error);
      font-family: var(--ddd-font-primary);
    }
    body {
      min-height: 750px;
    }
    #demo {
      padding: var(--ddd-spacing-4);
    }

    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      :root {
        --ddd-theme-primary: #2a2a2a;
        --ddd-theme-accent: #4a4a4a;
        --ddd-theme-default-original87Pink: #f48fb1;
        --ddd-theme-default-original87PinkHover: #f06292;
        --ddd-theme-default-warningLight: #e0e0e0;
        --ddd-theme-default-shrineTan: #5a5a5a;
        --ddd-theme-default-error: #ff6b6b;
        --ddd-theme-default-alertUrgent: #1a1a1a;
      }

      :root, html, body {
        background-color: #1a1a1a;
        color: #e0e0e0;
      }

      .team-box {
        background: rgba(80, 80, 80, 0.95);
        box-shadow: inset 0 0 0 1px rgba(224, 224, 224, 0.2);
      }

      .team-row {
        border-bottom-color: rgba(224, 224, 224, 0.15);
      }

      .team-images img {
        border-color: rgba(224, 224, 224, 0.3);
      }

      .hero-overlay {
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: brightness(0.5);
      }
    }
    .hero-section {
      position: relative;
      width: 100%;
      max-width: 1920px;
      min-height: 360px;
      margin-bottom: var(--ddd-spacing-4);
      background: center / cover no-repeat url("./images/bull-icon-color.png");
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: var(--ddd-radius-lg);
    }
    .hero-overlay {
      position: absolute;
      inset: var(--ddd-spacing-0);
      background: var(--ddd-theme-default-potentialMidnight);
      backdrop-filter: brightness(0.75);
      pointer-events: none;
    }
    .hero-text {
      position: relative;
      z-index: 1;
      color: var(--ddd-theme-default-warningLight);
      text-align: center;
      padding: var(--ddd-spacing-4);
      max-width: 90%;
    }
    .hero-text h2 {
      margin: 0 0 0 12px;
      font-size: clamp(2rem, 4vw, 4rem);
      color: var(--ddd-theme-default-warningLight);
      letter-spacing: 0.03em;
      line-height: 1.05;
    }
    .hero-text p {
      margin: var(--ddd-spacing-0);
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--ddd-theme-default-warningLight);
    }
    .team-box {
      background: var(--ddd-theme-default-error);
      border-radius: var(--ddd-radius-lg);
      padding: var(--ddd-spacing-4);
      margin-bottom: var(--ddd-spacing-4);
      box-shadow: var(--ddd-boxShadow-sm) var(--ddd-theme-default-error);
    }
    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--ddd-spacing-3);
      padding: var(--ddd-radius-lg);
      border-bottom:var(--ddd-border-xs) var(--ddd-theme-default-error);
    }
    .team-row:last-child {
      border-bottom: none;
      padding-bottom: var(--ddd-spacing-0);
    }
    .team-label {
      font-size: var(--ddd-font-size-3xs);
      font-weight: var(--ddd-font-size-bold);
      color: var(--ddd-theme-default-warningLight);
      white-space: nowrap;
    }
    .team-images {
      display: grid;
      grid-template-columns: repeat(5, minmax(48px, 1fr));
      gap: var(--ddd-spacing-3);
      width: min(100%, 60%);
    }
    .team-images img {
      width: 100%;
      aspect-ratio: 1 / 1;
      height: auto;
      object-fit: cover;
      border-radius: var(--ddd-radius-md);
      border: var(--ddd-border-sm)var(--ddd-theme-default-error);
    }
    bull-app {
      margin: var(--ddd-spacing-2) 0 0;
      border: var(--ddd-border-md);
      border-radius: var(--ddd-radius-lg);
    }
    bull-app:hover {
      box-shadow: var(--ddd-boxShadow-sm);
    }
    html, body {
      min-width: 0;
      overflow-x: hidden;
    }
    #demo {
      max-width: 100%;
      overflow-x: hidden;
    }
    .team-row {
      flex-wrap: wrap;
    }
    .team-label {
      white-space: normal;
      width: 100%;
    }
    .team-images {
      width: 100%;
      grid-template-columns: repeat(auto-fit, minmax(48px, 1fr));
    }
    iframe {
      width: 100%;
      max-width: 100%;
    }
    @media (max-width: 640px) {
      .hero-section {
        min-height: 260px;
      }
      .hero-text {
        padding: var(--ddd-spacing-3);
      }
      .team-row {
        gap: var(--ddd-spacing-2);
      }
      .team-images {
        gap: var(--ddd-spacing-2);
      }
    }
  </style>
  <title>Bull Poker Leauge</title>
</head>
<body>
  <script type="module" src="./bull-playlist.js"></script>
  <script type="module" src="./bull-app.js"></script>
  <script type="module" src="./bull-banner.js"></script>
  <script type="module" src="./bull-pages.js"></script>
  <script type="module" src="./bull-footer.js"></script>
  <script type="module" src="./bull-roster.js"></script>

  <bull-banner></bull-banner>

  <div id="demo">
    <section class="hero-section" aria-label="Bull Poker League hero image">
      <div class="hero-overlay"></div>
      <div class="hero-text">
        <h2>Welcome to the Bull Poker League</h2>
        <p>High stakes, bold players, and the thrill of the table.</p>
      </div>
    </section>

    <section class="team-box" aria-label="Players and Bulls overview">
      <div class="team-row">
        <div class="team-label">Players</div>
        <div class="team-images"><bull-roster class="players"></bull-roster></div>
      </div>
      <div class="team-row">
        <div class="team-label">Bulls</div>
        <div class="team-images"><bull-roster class="bulls"></bull-roster></div>
      </div>
    </section>
    </section>

    <bull-app>
      <bull-playlist></bull-playlist>
    </bull-app>
  </div>
  <div id="pagesContainer" style="display: none;">
    <bull-pages activePage="calendar"></bull-pages>
  </div>
 
<bull-footer></bull-footer>

  <script>
    const banner = document.querySelector('bull-banner');
    const demo = document.getElementById('demo');
    const pagesContainer = document.getElementById('pagesContainer');

    const validPages = ['home', 'calendar', 'roster', 'about'];
    const routeForPage = (page) => page === 'home' ? '/' : `/${page}`;
    const pageFromPath = () => {
      const path = window.location.pathname.replace(/\/$/, '');
      if (path === '') return 'home';
      const page = path.slice(1);
      return validPages.includes(page) ? page : 'home';
    };

    const showPage = (page) => {
      if (!banner || !demo || !pagesContainer) return;
      const bullPages = pagesContainer.querySelector('bull-pages');
      if (page === 'home') {
        demo.style.display = 'block';
        pagesContainer.style.display = 'none';
      } else {
        demo.style.display = 'none';
        pagesContainer.style.display = 'block';
        if (bullPages) bullPages.activePage = page;
      }
    };

    const updateUrl = (page, replace = false) => {
      const path = routeForPage(page);
      const state = { page };
      if (replace) {
        history.replaceState(state, '', path);
      } else {
        history.pushState(state, '', path);
      }
    };

    if (banner && demo && pagesContainer) {
      banner.addEventListener('calendar-click', () => {
        showPage('calendar');
        updateUrl('calendar');
      });

      banner.addEventListener('roster-click', () => {
        showPage('roster');
        updateUrl('roster');
      });

      banner.addEventListener('about-click', () => {
        showPage('about');
        updateUrl('about');
      });

      banner.addEventListener('home-click', () => {
        showPage('home');
        updateUrl('home');
      });

      window.addEventListener('popstate', (event) => {
        const page = (event.state && event.state.page) || pageFromPath();
        showPage(page);
      });

      const initialPage = pageFromPath();
      showPage(initialPage);
      updateUrl(initialPage, true);
    }
  </script>
</body>
</html>
